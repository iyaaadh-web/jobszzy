server {
    listen 80;
    server_name jobszzy.com www.jobszzy.com admin.jobszzy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jobszzy.com www.jobszzy.com admin.jobszzy.com;

    ssl_certificate /etc/letsencrypt/live/jobszzy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobszzy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts to avoid 504 Gateway Time-out
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        alias /var/www/jobszzy/server/uploads/;
        add_header Cache-Control "public, max-age=2592000";
    }
}
