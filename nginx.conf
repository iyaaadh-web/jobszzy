# ==============================
# HTTP → HTTPS Redirect
# ==============================
server {
    listen 80;
    listen [::]:80;
    server_name jobszzy.com www.jobszzy.com admin.jobszzy.com;
    return 301 https://$host$request_uri;
}

# ==============================
# HTTPS Main Server
# ==============================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name jobszzy.com www.jobszzy.com admin.jobszzy.com;

    # SSL
    ssl_certificate /etc/letsencrypt/live/jobszzy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobszzy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root Directory
    root /var/www/jobszzy.com/public;
    index index.html index.htm index.php;

    # Logs
    access_log /var/log/nginx/jobszzy.com.access.log;
    error_log /var/log/nginx/jobszzy.com.error.log;

    # ==============================
    # Main Application (PHP)
    # ==============================
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM Configuration
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ==============================
    # Node.js App (if still needed)
    # ==============================
    # Uncomment this block IF you still want to proxy certain routes
    # Example: /api or admin panel running on port 5000

    # location /api/ {
    #     proxy_pass http://localhost:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    #     proxy_connect_timeout 60s;
    #     proxy_send_timeout 60s;
    #     proxy_read_timeout 60s;
    # }

    # ==============================
    # Static Uploads
    # ==============================
    location /uploads/ {
        alias /var/www/jobszzy/server/uploads/;
        add_header Cache-Control "public, max-age=2592000";
    }
}