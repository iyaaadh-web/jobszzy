name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 31.97.230.99
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/jobszzy
            git fetch origin main
            git reset --hard origin/main
            npm install
            npm run build
            cd server
            npm install
            pm2 restart jobszzy
